<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ARXIS — Research Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <style>
    :root {
      --bg: #05070f;
      --surface: #0b0f1e;
      --surface2: #111827;
      --border: #1e2d4a;
      --accent: #00e5ff;
      --accent2: #7b2fff;
      --accent3: #ff2d78;
      --text: #e2e8f0;
      --muted: #4a5568;
      --success: #00ffa3;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow orbs */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(123,47,255,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .orb2 {
      position: fixed;
      bottom: -200px;
      left: -100px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(0,229,255,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      padding: 32px 0 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 48px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { filter: drop-shadow(0 0 8px rgba(0,229,255,0.6)); }
      50% { filter: drop-shadow(0 0 20px rgba(0,229,255,0.9)); }
    }

    .logo-text {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-sub {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 3px;
      margin-top: 2px;
    }

    /* Input form */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      margin-bottom: 48px;
      position: relative;
      overflow: hidden;
    }

    .form-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
    }

    .form-title {
      font-size: 13px;
      letter-spacing: 3px;
      color: var(--accent);
      font-family: 'Space Mono', monospace;
      margin-bottom: 28px;
      text-transform: uppercase;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      font-family: 'Space Mono', monospace;
    }

    input, textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      padding: 12px 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      resize: none;
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,255,0.08);
    }

    textarea { min-height: 80px; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px 32px;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      text-transform: uppercase;
    }

    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-row {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    /* Loading state */
    .loading-bar {
      display: none;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 20px;
    }

    .loading-bar.active { display: block; }

    .loading-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--accent), var(--accent2));
      background-size: 200% 100%;
      animation: loading-slide 1.5s linear infinite;
    }

    @keyframes loading-slide {
      0% { background-position: 200% 0; width: 100%; }
      100% { background-position: -200% 0; width: 100%; }
    }

    .loading-text {
      display: none;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 2px;
      margin-top: 12px;
    }
    .loading-text.active { display: block; }

    /* Error */
    .error-box {
      display: none;
      background: rgba(255,45,120,0.08);
      border: 1px solid var(--accent3);
      border-radius: 8px;
      padding: 16px 20px;
      color: var(--accent3);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      margin-top: 20px;
    }
    .error-box.active { display: block; }

    /* Results */
    #results {
      display: none;
      animation: fade-up 0.5s ease forwards;
    }
    #results.active { display: block; }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Report header */
    .report-header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 40px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }

    .report-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .report-topic {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .report-meta {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .meta-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 14px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .meta-chip span { color: var(--accent); }

    /* Research questions */
    .rq-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 32px;
    }

    .rq-item {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
    }

    .rq-num {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--accent2);
      min-width: 24px;
      margin-top: 1px;
    }

    .rq-text { font-size: 14px; line-height: 1.5; }

    /* Papers grid */
    .papers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .paper-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px;
      transition: border-color 0.2s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }

    .paper-card:hover {
      border-color: rgba(0,229,255,0.3);
      transform: translateY(-2px);
    }

    .paper-year {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .paper-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 10px;
    }

    .paper-title a {
      color: var(--text);
      text-decoration: none;
    }
    .paper-title a:hover { color: var(--accent); }

    .paper-authors {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 10px;
      line-height: 1.6;
    }

    .paper-venue {
      display: inline-block;
      background: rgba(123,47,255,0.12);
      border: 1px solid rgba(123,47,255,0.3);
      border-radius: 4px;
      padding: 2px 8px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: #a78bfa;
      margin-bottom: 12px;
    }

    .paper-relevance {
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.5;
      border-top: 1px solid var(--border);
      padding-top: 12px;
      margin-top: 4px;
    }

    /* Formulas */
    .formulas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .formula-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      transition: border-color 0.2s;
    }

    .formula-card:hover { border-color: rgba(0,229,255,0.3); }

    .formula-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    .formula-display {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      margin-bottom: 14px;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: auto;
    }

    .formula-desc {
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.5;
    }

    .formula-ref {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-top: 10px;
    }

    /* Trends */
    .trends-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 48px;
    }

    .trend-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent2);
      border-radius: 12px;
      padding: 22px 26px;
      transition: border-color 0.2s;
    }

    .trend-card:hover { border-color: rgba(123,47,255,0.6); }

    .trend-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .trend-desc {
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .trend-refs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .trend-ref-chip {
      background: rgba(123,47,255,0.1);
      border: 1px solid rgba(123,47,255,0.25);
      border-radius: 4px;
      padding: 2px 10px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: #a78bfa;
    }

    /* Counter badges */
    .count-badge {
      background: rgba(0,229,255,0.1);
      border: 1px solid rgba(0,229,255,0.2);
      border-radius: 20px;
      padding: 2px 10px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      margin-left: 8px;
    }

    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }
      .papers-grid, .formulas-grid { grid-template-columns: 1fr; }
      .form-card { padding: 24px; }
      .report-header { padding: 24px; }
    }
  </style>
</head>
<body>
  <div class="orb2"></div>

  <div class="container">
    <header>
      <div class="logo">
        <div class="logo-icon"></div>
        <div>
          <div class="logo-text">ARXIS</div>
          <div class="logo-sub">Research Intelligence System</div>
        </div>
      </div>
    </header>

    <!-- Input Form -->
    <div class="form-card">
      <div class="form-title">// New Research Query</div>
      <div class="form-grid">
        <div class="form-group full">
          <label>Research Topic</label>
          <input type="text" id="topic" placeholder="e.g. Recommender systems based on embedding similarity" />
        </div>
        <div class="form-group full">
          <label>Key Research Questions</label>
          <textarea id="questions" placeholder="Enter each question on a new line, e.g.&#10;Do they outperform conventional SOTA models?&#10;What are the computational requirements?"></textarea>
        </div>
        <div class="form-group">
          <label>Time Frame</label>
          <input type="text" id="timeframe" placeholder="e.g. 2022–2025 or leave blank" />
        </div>
      </div>
      <div class="btn-row">
        <button class="btn" id="generateBtn" onclick="generate()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Run Analysis
        </button>
      </div>
      <div class="loading-bar" id="loadingBar"><div class="loading-bar-fill"></div></div>
      <div class="loading-text" id="loadingText">◈ Querying research database — this may take 30–60 seconds...</div>
      <div class="error-box" id="errorBox"></div>
    </div>

    <!-- Results -->
    <div id="results">
      <!-- Report Header -->
      <div class="report-header">
        <div class="report-topic" id="reportTopic"></div>
        <div class="report-meta" id="reportMeta"></div>
      </div>

      <!-- Research Questions -->
      <div class="section-label">Research Questions <span class="count-badge" id="rqCount"></span></div>
      <ul class="rq-list" id="rqList"></ul>

      <!-- Papers -->
      <div class="section-label">Relevant Papers <span class="count-badge" id="papersCount"></span></div>
      <div class="papers-grid" id="papersGrid"></div>

      <!-- Formulas -->
      <div class="section-label">Key Formulas <span class="count-badge" id="formulasCount"></span></div>
      <div class="formulas-grid" id="formulasGrid"></div>

      <!-- Trends -->
      <div class="section-label">Emerging Trends <span class="count-badge" id="trendsCount"></span></div>
      <div class="trends-list" id="trendsList"></div>
    </div>
  </div>

  <script>
    async function generate() {
      const topic = document.getElementById('topic').value.trim();
      const questions = document.getElementById('questions').value.trim();
      const timeframe = document.getElementById('timeframe').value.trim();

      if (!topic || !questions) {
        showError('Please fill in the topic and research questions.');
        return;
      }

      // UI loading state
      document.getElementById('generateBtn').disabled = true;
      document.getElementById('loadingBar').classList.add('active');
      document.getElementById('loadingText').classList.add('active');
      document.getElementById('errorBox').classList.remove('active');
      document.getElementById('results').classList.remove('active');

      try {
        const res = await fetch('/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic, questions, timeframe })
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'An error occurred.');
          return;
        }

        renderReport(data);
      } catch (e) {
        showError('Network error: ' + e.message);
      } finally {
        document.getElementById('generateBtn').disabled = false;
        document.getElementById('loadingBar').classList.remove('active');
        document.getElementById('loadingText').classList.remove('active');
      }
    }

    function showError(msg) {
      const box = document.getElementById('errorBox');
      box.textContent = '⚠ ' + msg;
      box.classList.add('active');
    }

    function renderReport(data) {
      // Header
      document.getElementById('reportTopic').textContent = data.topic;
      const meta = document.getElementById('reportMeta');
      meta.innerHTML = '';
      if (data.time_frame) {
        meta.innerHTML += `<div class="meta-chip">Timeframe: <span>${data.time_frame}</span></div>`;
      }
      meta.innerHTML += `<div class="meta-chip">Papers: <span>${data.papers.length}</span></div>`;
      meta.innerHTML += `<div class="meta-chip">Formulas: <span>${data.formulas.length}</span></div>`;
      meta.innerHTML += `<div class="meta-chip">Trends: <span>${data.trends.length}</span></div>`;

      // Research Questions
      document.getElementById('rqCount').textContent = data.research_questions.length;
      const rqList = document.getElementById('rqList');
      rqList.innerHTML = data.research_questions.map((q, i) =>
        `<li class="rq-item"><span class="rq-num">Q${String(i+1).padStart(2,'0')}</span><span class="rq-text">${esc(q)}</span></li>`
      ).join('');

      // Papers
      document.getElementById('papersCount').textContent = data.papers.length;
      const papersGrid = document.getElementById('papersGrid');
      papersGrid.innerHTML = data.papers.map(p => `
        <div class="paper-card">
          <div class="paper-year">${p.year}</div>
          <div class="paper-title">${p.url ? `<a href="${esc(p.url)}" target="_blank">${esc(p.title)}</a>` : esc(p.title)}</div>
          <div class="paper-authors">${esc(p.authors.join(', '))}</div>
          ${p.venue ? `<div class="paper-venue">${esc(p.venue)}</div>` : ''}
          <div class="paper-relevance">${esc(p.relevance)}</div>
        </div>
      `).join('');

      // Formulas
      document.getElementById('formulasCount').textContent = data.formulas.length;
      const formulasGrid = document.getElementById('formulasGrid');
      formulasGrid.innerHTML = data.formulas.map((f, i) => `
        <div class="formula-card">
          <div class="formula-name">${esc(f.name)}</div>
          <div class="formula-display" id="formula-${i}"></div>
          <div class="formula-desc">${esc(f.description)}</div>
          ${f.reference ? `<div class="formula-ref">↗ ${esc(f.reference)}</div>` : ''}
        </div>
      `).join('');

      // Render LaTeX after DOM update
      data.formulas.forEach((f, i) => {
        const el = document.getElementById(`formula-${i}`);
        if (el && window.katex) {
          try {
            katex.render(f.latex, el, { throwOnError: false, displayMode: true });
          } catch(e) {
            el.textContent = f.latex;
          }
        }
      });

      // Trends
      document.getElementById('trendsCount').textContent = data.trends.length;
      const trendsList = document.getElementById('trendsList');
      trendsList.innerHTML = data.trends.map(t => `
        <div class="trend-card">
          <div class="trend-title">${esc(t.title)}</div>
          <div class="trend-desc">${esc(t.description)}</div>
          ${t.reference.length ? `
            <div class="trend-refs">
              ${t.reference.map(r => `<span class="trend-ref-chip">${esc(r)}</span>`).join('')}
            </div>` : ''}
        </div>
      `).join('');

      document.getElementById('results').classList.add('active');
      document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
    }

    function esc(str) {
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }

    // Enter key on inputs
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.ctrlKey) generate();
    });
  </script>
</body>
</html>
